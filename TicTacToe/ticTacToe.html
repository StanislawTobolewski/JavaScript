<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>TicTacToe</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div id="gameContainer">
		<h1 id="title">Tic Tac Toe</h1>
		<div id="playersContainer">
			<div id="player01" class="player01">Player 1 - O</div>
			<div id="player02" class="player02">Player 2 - X</div>
		</div>
		<div class="row">
		<div id="sq1x1" class="tile"></div>
		<div id="sq1x2" class="tile"></div>
		<div id="sq1x3" class="tile"></div>
		</div>
		<div class="row">
		<div id="sq2x1" class="tile"></div>
		<div id="sq2x2" class="tile"></div>
		<div id="sq2x3" class="tile"></div>
		</div>
		<div class="row">
		<div id="sq3x1" class="tile"></div>
		<div id="sq3x2" class="tile"></div>
		<div id="sq3x3" class="tile"></div>
		</div>
	</div>
	<div id="btnReset">Restart</div>
	<div id="winner" class="hidden">Player 1 win !</div>
	<script src="script.js"></script>
</body>
</html>
