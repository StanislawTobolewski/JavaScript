<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Functions</title>
	<link rel="stylesheet" href="style.css"/>
</head>

<body>
	<div id="container">
		<header>
			<div>
				<div id="headerMenu">
					<button class="btn again">Again</button>
					<p class="between">Guess number<br/>Between 1 and 20</p>
				</div>
				<div id="headerData">
					<h1>Guess My Number</h1>
					<p class="number">?</p>
				</div>
			</div>
		</header>
		<main>
			<div>
				<div>
					<section class="left">
						<input type="number" class="guess"/>
						<button class="btn check">Check!</button>
					</section>
				</div>
				<section class="right">
					<div>
						<p class="message">Start guessing...</p>
						<p class="label-score">Your score: <span class="score">20</span></p>
						<p class="label-highscore">MAX SCORE: 0</p>
					</div>
				</section>
			</div>
		</main>
	</div>
	<script src="script.js"></script>
</body>
</html>
